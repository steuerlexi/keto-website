<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen - KetoGuide</title>
    <meta name="description" content="Setze dein KetoGuide Passwort zurück.">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, var(--apple-gray-100) 0%, var(--apple-white) 100%);
            padding: 100px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 48px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .auth-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input {
            padding: 14px 16px;
            border: 1px solid var(--apple-gray-300);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-family: var(--font-system);
            transition: all 0.3s var(--transition-smooth);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .btn-auth {
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
        }

        .btn-primary-auth {
            background: var(--apple-blue);
            color: white;
        }

        .btn-primary-auth:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.02);
        }

        .btn-primary-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--apple-blue);
            font-weight: 500;
        }

        .alert {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .temp-password {
            background: var(--apple-gray-100);
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: center;
            margin-top: 16px;
        }

        .temp-password-code {
            font-size: 24px;
            font-weight: 600;
            color: var(--apple-blue);
            font-family: monospace;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-icon">🔑</div>
                <div class="auth-logo">KetoGuide</div>
                <h1 class="auth-title">Passwort vergessen?</h1>
                <p class="auth-subtitle">Kein Problem - wir senden dir ein neues Passwort</p>
            </div>

            <div id="alertContainer"></div>

            <form class="auth-form" id="resetForm">
                <div class="form-group">
                    <label for="email">E-Mail Adresse</label>
                    <input type="email" id="email" name="email" required placeholder="deine@email.de" autocomplete="email">
                    <span class="form-hint">Gib die E-Mail ein, mit der du registriert bist</span>
                </div>

                <button type="submit" class="btn-auth btn-primary-auth" id="submitBtn">
                    Passwort zurücksetzen
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html">← Zurück zum Login</a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/auth.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submitBtn');
            const alertContainer = document.getElementById('alertContainer');

            btn.disabled = true;
            btn.textContent = 'Wird gesendet...';

            const result = KetoAuth.resetPassword(email);

            if (result.success) {
                showAlert('success', 'Hier ist dein temporäres Passwort:');
                document.getElementById('alertContainer').innerHTML += `
                    <div class="temp-password">
                        <div class="temp-password-code">${result.tempPassword}</div>
                        <p style="margin: 12px 0 0; font-size: 13px; color: var(--text-secondary);">
                            Melde dich damit an und ändere dein Passwort in den Einstellungen.
                        </p>
                    </div>
                `;
                btn.textContent = 'Gesendet!';
            } else {
                showAlert('error', result.message);
                btn.disabled = false;
                btn.textContent = 'Passwort zurücksetzen';
            }
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" style="display: block;">
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
