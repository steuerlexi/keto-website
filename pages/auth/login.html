<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KetoGuide Premium</title>
    <meta name="description" content="Melde dich bei deinem KetoGuide Premium Konto an.">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, var(--apple-gray-100) 0%, var(--apple-white) 100%);
            padding: 100px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 48px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input {
            padding: 14px 16px;
            border: 1px solid var(--apple-gray-300);
            border-radius: var(--radius-md);
            font-size: 16px;
            font-family: var(--font-system);
            transition: all 0.3s var(--transition-smooth);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--apple-blue);
            font-weight: 500;
        }

        .forgot-link:hover {
            color: var(--apple-blue-hover);
        }

        .btn-auth {
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
        }

        .btn-primary-auth {
            background: var(--apple-blue);
            color: white;
        }

        .btn-primary-auth:hover {
            background: var(--apple-blue-hover);
            transform: scale(1.02);
        }

        .btn-primary-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--apple-gray-200);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--apple-blue);
            font-weight: 500;
        }

        .auth-footer a:hover {
            color: var(--apple-blue-hover);
        }

        .alert {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .demo-credentials {
            background: var(--apple-gray-100);
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .demo-credentials strong {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">KetoGuide</div>
                <h1 class="auth-title">Willkommen zurück</h1>
                <p class="auth-subtitle">Melde dich an, um fortzufahren</p>
            </div>

            <div id="alertContainer"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" required placeholder="deine@email.de" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Angemeldet bleiben</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Passwort vergessen?</a>
                </div>

                <button type="submit" class="btn-auth btn-primary-auth" id="submitBtn">
                    Einloggen
                </button>
            </form>

            <div class="demo-credentials">
                <strong>Demo Login:</strong><br>
                E-Mail: admin@ketoguide.com<br>
                Passwort: admin123
            </div>

            <div class="auth-footer">
                Noch kein Konto? <a href="register.html">Jetzt kostenlos registrieren</a>
            </div>

            <div class="auth-footer">
                <a href="../../index.html">← Zurück zur Startseite</a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('submitBtn');
            const alertContainer = document.getElementById('alertContainer');

            btn.disabled = true;
            btn.textContent = 'Wird geladen...';

            const result = KetoAuth.login(email, password);

            if (result.success) {
                showAlert('success', result.message + ' Weiterleitung...');
                setTimeout(() => {
                    window.location.href = 'redirect.html';
                }, 1500);
            } else {
                showAlert('error', result.message);
                btn.disabled = false;
                btn.textContent = 'Einloggen';
            }
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" style="display: block;">
                    ${message}
                </div>
            `;
        }

        // Check if already logged in
        if (KetoAuth.isLoggedIn()) {
            window.location.href = 'redirect.html';
        }
    </script>
</body>
</html>
